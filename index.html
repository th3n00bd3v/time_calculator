<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Work Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .input-focus:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .animate-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-32">

    <nav class="w-full max-w-2xl mx-auto p-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black shadow-lg">W</div>
            <h1 class="font-bold tracking-tight text-lg">WorkPulse</h1>
        </div>
        <div id="current-date" class="text-xs font-bold text-slate-400 uppercase tracking-widest">March 2026</div>
    </nav>

    <main class="w-full max-w-xl mx-auto px-4 space-y-6">

        <section class="glass-card border border-white rounded-[2.5rem] p-6 shadow-xl shadow-slate-200/50">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-extrabold text-xs uppercase tracking-wider text-slate-400">Shift Hours</h2>
                <div class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-bold uppercase">Main Interval</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase ml-1">Clock In</label>
                    <input type="time" id="in-time" class="w-full bg-slate-100/50 border-2 border-transparent rounded-2xl p-4 font-bold text-lg input-focus outline-none transition-all">
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase ml-1">Clock Out</label>
                    <input type="time" id="out-time" class="w-full bg-slate-100/50 border-2 border-transparent rounded-2xl p-4 font-bold text-lg input-focus outline-none transition-all">
                </div>
            </div>

            <div id="work-duration" class="mt-6 p-4 bg-slate-900 rounded-2xl text-center">
                <span class="text-slate-400 text-[10px] font-bold uppercase block mb-1">Gross Time</span>
                <span class="text-white font-black text-2xl tracking-tight">0h 0m</span>
            </div>
        </section>

        <section class="space-y-4">
            <div class="flex items-center justify-between px-2">
                <h2 class="font-extrabold text-xs uppercase tracking-wider text-slate-400">Break Intervals</h2>
                <button id="add-break-btn" class="bg-white border border-slate-200 p-2.5 rounded-xl shadow-sm hover:shadow-md transition-all active:scale-90">
                    <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                </button>
            </div>

            <div id="breaks-container" class="space-y-3"></div>

            <div id="total-break-duration" class="text-right px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                Total breaks: 0m
            </div>
        </section>

        <div id="net-duration-section" class="hidden animate-up space-y-4">
            <div id="net-card" class="bg-emerald-500 rounded-[2.5rem] p-8 text-center shadow-2xl shadow-emerald-200 border-b-8 border-emerald-700 transition-colors">
                <p id="net-label" class="text-emerald-100 text-xs font-black uppercase tracking-[0.3em] mb-2">Net Work Hours</p>
                <h2 id="net-duration" class="text-white text-5xl font-black tracking-tighter italic">0h 0m</h2>
            </div>
            <p id="error-message" class="text-red-500 text-[10px] font-black text-center uppercase tracking-widest px-6"></p>
        </div>

    </main>

    <div class="fixed bottom-6 left-0 right-0 px-6 z-50">
        <div class="max-w-md mx-auto bg-slate-900/90 backdrop-blur-md rounded-[2rem] p-3 shadow-2xl flex gap-3 border border-slate-700/50">
            <button id="reset-btn" disabled class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase tracking-widest hover:text-red-400 transition-colors">
                Reset
            </button>
            <button id="export-btn" disabled class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-500/30 transition-all active:scale-95">
                Export Sheet
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
